# Simulates GS + customer shared config for a GrafanaOrganization CR.
organizationName: "security_test"
displayName: "Security Test"
rbac:
  admins:
    - "giantswarm:security-admins"
  editors:
    - "giantswarm:security-editors"
  viewers:
    - "giantswarm:security-viewers"
tenants:
  - name: security-test
    types:
      - data
      - alerting
# Customer config is loaded from the cluster.
customer:
  allowedRoles:
    - "viewers"
